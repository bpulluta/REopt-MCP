[workspace]
name = "reopt-mcp"
version = "0.4.0"
description = "MCP server for NLR's REopt API"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.10"
mcp = ">=1.0.0"
httpx = ">=0.27.0"
pydantic = ">=2.0.0"
python-dotenv = ">=1.0.0"

[tasks]
server = "python -m reopt_mcp"
simulate = { cmd = "python -m reopt_mcp.simulate", env = { PYTHONPATH = "." } }
test = { cmd = "pytest -q tests", env = { PYTHONPATH = "." } }
api-test = { cmd = "pytest -q -m integration tests", env = { PYTHONPATH = "." } }
lint = "ruff check reopt_mcp tests"
format = "ruff format reopt_mcp tests"
format-check = "ruff format --check reopt_mcp tests"
examples = "python -m reopt_mcp.examples"

[feature.dev.dependencies]
pytest = "*"
ruff = "*"

[environments]
dev = ["dev"]
